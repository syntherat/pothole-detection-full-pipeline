<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PAVE — Live Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ── TOP BAR ── -->
  <div id="topbar">
    <div id="logo">PAVE<span></span></div>
    <div id="status-pill">
      <div id="status-dot"></div>
      <span>MONITORING</span>
    </div>
    <div id="gps-pill">
      <div id="gps-dot"></div>
      <span id="gps-label">GPS OFF</span>
    </div>
    <div class="spacer"></div>
    <button id="btn-potholes" onclick="openPotholePanel()">
      ⚠ Potholes Detected
      <span class="badge" id="badge-count">0</span>
    </button>
    <button id="btn-simulate" onclick="simulateDetection()">+ Simulate Detection</button>
  </div>

  <!-- ── MAIN ── -->
  <div id="main">

    <!-- Map -->
    <div id="map">
      <div id="google-map"></div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">// Live Feed</div>

      <!-- Boolean detection status -->
      <div id="detection-card">
        <div id="detection-label">POTHOLE DETECTED</div>
        <div id="detection-status" class="safe">FALSE</div>
        <div id="detection-sub">No pothole in current zone</div>
      </div>

      <!-- GPS coordinates -->
      <div id="gps-card">
        <div id="gps-card-label">// YOUR LOCATION</div>
        <div id="gps-coords">Waiting for GPS…</div>
      </div>

      <!-- Proximity alert -->
      <div id="proximity-card">
        <div id="proximity-label">⚠ POTHOLE NEARBY</div>
        <div id="proximity-dist">No potholes nearby</div>
        <div id="proximity-name">Radius: 100m</div>
      </div>

      <!-- Live event feed -->
      <div id="list-section">
        <div class="list-title">// Recent Events</div>
        <div id="live-list">
          <div style="font-size:12px;font-family:var(--font-mono);color:var(--muted);padding:10px 0;">
            Awaiting detection events…
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── POTHOLE HISTORY PANEL ── -->
  <div id="pothole-panel">
    <div id="panel-topbar">
      <div id="panel-title">⚠ All Detected Potholes</div>
      <span id="panel-count">0 potholes</span>
      <button id="btn-close-panel" onclick="closePotholePanel()">✕ Close</button>
    </div>
    <div id="panel-body">
      <div id="panel-list">
        <div id="panel-ph-list"></div>
      </div>
      <div id="panel-map">
        <div id="panel-google-map"></div>
      </div>
    </div>
  </div>

  <!-- ── TOAST NOTIFICATION ── -->
  <div id="toast">
    <div class="t-dot"></div>
    <span id="toast-msg"></span>
  </div>

  <script src="app.js"></script>

</body>
</html>
